name: Security Audit

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  api-nuget-vulnerabilities:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore API dependencies
        run: dotnet restore "backend/MyBudget.Api/MyBudget.Api.csproj"

      - name: Check NuGet vulnerabilities
        run: dotnet list "backend/MyBudget.Api/MyBudget.Api.csproj" package --vulnerable --include-transitive

  ui-npm-audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/my-budget-ui
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/my-budget-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit (high+)
        run: npm audit --audit-level=high

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
