# Synology Container Manager → Project → Create from docker-compose.yml (this file).
# If DSM reports: Failed to load .../docker-compose.env — create that file in the project folder
# (repo includes docker-compose.env; or copy env.example and rename).
#
# Prerequisites on the NAS:
# - Container Manager installed; note the host path you use for bind mounts (often /volume1/docker/...).
# - For pipeline builds that call `docker`: this compose mounts the Synology Docker socket into Jenkins.
#
# After first start: open http://<nas-ip>:<JENKINS_HTTP_HOST_PORT> and complete the setup wizard
# (initialAdminPassword is in container logs).

services:
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DOCKER_GID: ${DOCKER_GID:-0}
    image: mybudget-jenkins:local
    container_name: MyBudget-jenkins
    restart: unless-stopped
    user: root
    ports:
      - "${JENKINS_HTTP_HOST_PORT:-8095}:8080"
      - "${JENKINS_AGENT_HOST_PORT:-50000}:50000"
    environment:
      TZ: ${TZ:-Europe/Berlin}
      JAVA_OPTS: >-
        -Dhudson.model.DirectoryBrowserSupport.CSP=
        -Xmx${JENKINS_JAVA_HEAP_MB:-1024}m
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      # MyBudget deploy dir on the NAS (must match MYBUDGET_DEPLOY_DIR in deploy/jenkins/Jenkinsfile).
      # Same host path inside the container so docker compose bind mounts resolve on the Synology host.
      # - /volume1/docker/mybudget:/volume1/docker/mybudget:ro
      # Optional: persist GitHub SSH keys / known_hosts (create folder on NAS first).
      # - ${JENKINS_SSH_DIR:-/volume1/docker/jenkins-ssh}:/var/jenkins_home/.ssh
    # Synology Docker API is on the host socket; root in-container avoids GID mismatches with `docker` on DSM.

volumes:
  jenkins_home:
