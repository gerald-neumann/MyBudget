# Example: TLS on the Docker HOST, forwarding everything to the Portainer stack edge.
# Stack publish: MYBUDGET_EDGE_PUBLISH=127.0.0.1:18080:80
# Replace certificate paths and upstream port as needed.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 443 ssl http2;
    server_name mybudget.flowparity.com;

    ssl_certificate     /etc/letsencrypt/live/mybudget.flowparity.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mybudget.flowparity.com/privkey.pem;

    client_max_body_size 20m;

    location / {
        proxy_pass http://127.0.0.1:18080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}

server {
    listen 80;
    server_name mybudget.flowparity.com;
    return 301 https://$host$request_uri;
}
