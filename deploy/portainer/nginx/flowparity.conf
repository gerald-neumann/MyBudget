# Single host: SPA at / and API at /api (path forwarded unchanged so the API can use PublicPathBase=/api).
# Legacy reference: this file matched the old `mybudget-reverse-proxy` container. Production routing is now
# baked into `frontend/my-budget-ui/nginx.conf` (UI image proxies /api/ to `api:8080`).

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream mybudget_ui {
    server ui:80;
}

upstream mybudget_api {
    server api:8080;
}

server {
    listen 80;
    server_name mybudget.flowparity.com;

    client_max_body_size 20m;

    # API — forward full URI (/api/...) to Kestrel (UsePathBase /api in the app)
    location /api/ {
        proxy_pass http://mybudget_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api {
        return 308 $scheme://$host/api/;
    }

    # Angular SPA (everything else)
    location / {
        proxy_pass http://mybudget_ui;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
