# Keycloak + PostgreSQL for Docker / Portainer.
# Set variables in .env (see env.example, flowparity.env.example, or docker-compose.env). Postgres data: bind mount KEYCLOAK_PGDATA_HOST
# (persists when the stack is recreated; back up that folder for restores).
# Container names are generic (standalone IdP). MyBudget app stack: deploy/portainer/docker-compose.yml.

name: mybudget-keycloak

services:
  keycloak-db:
    image: postgres:16-alpine
    container_name: keycloak-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
    volumes:
      # Persistent PostgreSQL files on the host (see KEYCLOAK_PGDATA_HOST in .env). Not a single "file" — a directory.
      - "${KEYCLOAK_PGDATA_HOST:-./pgdata}:/var/lib/postgresql/data"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 10s
      timeout: 5s
      retries: 12

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.1
    container_name: keycloak
    restart: unless-stopped
    command: start
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      # First-time admin user (Keycloak 26+); stored in .env as KEYCLOAK_ADMIN_* for readability.
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      # Public URL users and tokens use (must match reverse proxy / DNS).
      KC_HOSTNAME: ${KEYCLOAK_HOSTNAME}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      # Default `/` = root path. Set `KC_HTTP_RELATIVE_PATH=/keycloak` in .env for https://auth…/keycloak/… (flowparity).
      KC_HTTP_RELATIVE_PATH: ${KC_HTTP_RELATIVE_PATH:-/}
      KC_PROXY_HEADERS: xforwarded
      KC_HEALTH_ENABLED: "true"
    ports:
      - "${KEYCLOAK_HTTP_PORT:-8081}:8080"
    depends_on:
      keycloak-db:
        condition: service_healthy
