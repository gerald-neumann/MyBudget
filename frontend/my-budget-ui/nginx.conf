# SPA + /api reverse proxy (Docker service name `api`, Kestrel with PublicPathBase=/api).
#
# Dynamic DNS: a static `upstream { server api:8080; }` resolves `api` only once at nginx start. After
# `docker compose`/Portainer recreates the API container, its IP changes → nginx keeps the stale IP → 502
# until the UI container restarts. `resolver` + variable `proxy_pass` re-query Docker’s DNS (127.0.0.11).

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    include /etc/nginx/mime.types;

    resolver 127.0.0.11 ipv6=off valid=10s;

    client_max_body_size 20m;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; frame-ancestors 'none'; object-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' https://auth.flowparity.com https://auth.ispark.diskstation.me;" always;

    # Do not SPA-fallback to index.html when config.json is missing (breaks Keycloak detection).
    location = /config.json {
        default_type application/json;
        try_files /config.json =404;
    }

    location /api/ {
        set $api_upstream_host api;
        proxy_pass http://$api_upstream_host:8080$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api {
        return 308 $scheme://$host/api/;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
}
