# Local stack: Postgres + API + static UI (nginx).
# From repo root: docker compose up -d --build
# UI: http://localhost:9080  |  API: http://localhost:5256  |  Postgres: localhost:5432
#
# Production (Portainer / TLS / Keycloak): see deploy/portainer/PORTAINER-FLOWPARITY-DEPLOY.md

name: mybudget

services:
  postgres:
    image: postgres:16-alpine
    container_name: mybudget-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: my_budget
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - my_budget_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d my_budget"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: backend/MyBudget.Api/Dockerfile
    image: mybudget-api:local
    container_name: mybudget-api
    restart: unless-stopped
    environment:
      ASPNETCORE_URLS: http://+:8080
      ASPNETCORE_ENVIRONMENT: Development
      DISABLE_HTTPS_REDIRECT: "true"
      ConnectionStrings__Database: "Host=postgres;Port=5432;Database=my_budget;Username=postgres;Password=postgres"
      Auth__Enabled: "false"
      FrontendOrigin: "http://localhost:9080"
    ports:
      - "5256:8080"
    depends_on:
      postgres:
        condition: service_healthy

  ui:
    build:
      context: .
      dockerfile: frontend/my-budget-ui/Dockerfile
      secrets:
        - fontawesome_npm_token
    image: mybudget-ui:local
    container_name: mybudget-ui
    restart: unless-stopped
    ports:
      - "9080:80"
    volumes:
      - ./docker/ui-config.local.json:/usr/share/nginx/html/config.json:ro
    depends_on:
      - api

secrets:
  fontawesome_npm_token:
    environment: FONTAWESOME_PRO_TOKEN

volumes:
  my_budget_pgdata:
