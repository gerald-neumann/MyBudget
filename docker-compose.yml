services:
  postgres:
    image: postgres:16-alpine
    container_name: MyBudget-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: my_budget_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - my_budget_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d my_budget_dev"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  my_budget_pgdata:
